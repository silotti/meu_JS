<!-- Método Remoção de Elementos -->
<html><body><script>
//Removendo elementos
var primos = [2,3,5,7,11,13,17];
console.log(primos.length); //imprime: 7 , quantidade de indices
console.log(primos); //imprime valores: [2,3,5,7,11,13,17]

primos.length = 4;
console.log(primos.length); //imprime: 4 , quantidade de indices
console.log(primos); //imprime valores: [2,3,5,7], 4 indices 0 à 3

</script></body></html>
