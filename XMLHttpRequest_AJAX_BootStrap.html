<!-- Exemplo_XMLHttpRequest_AJAX -->
<!-- Utilizar XMLHttpRequest para chamar GET para httpbin.org-->
<!-- Vai retornar uma resposta no formato JSON -->
<!-- Se quiser no formato de Java Script, tem que usa:jason.pars -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">	
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>	
</head>

<body class="container">
	<h1>API de Testes httpbin</h1>
	<p>Utilizando requisições assíncronas com XMLHttpRequest</p>
	<form class="form m-2">
		<label class="form-label">Name</label>
		<input class="form-control" id="n1" type="text"/>
		<!-- o evento que vai ser on click -->
		<a class="btn btn-primary m-2" href="#" onclick="executar()">Executar</a>
	</form>
	<div class="alert alert-warning" id="retorno"></div>

	<!--importo o script .js do servidor como a fução do AJAX-->
	<script src="XMLHttpRequest_AJAX.js"></script>
	<script>
		const executar = () =>{
			//quero texto, eval sé se quiser pegar um numero
			const nome = document.getElementById("n1").value;
			//passa para a função ajax(.js), passando o nome e retorno
			ajax(nome,"retorno");
		}
	</script>
</body></html>
