<!DOCTYPE html>
<html lang="pt-BR">
<head>
     <meta charset="utf-8">
     <title>Incorporando Javascript em Páginas HTML</title>
</head>
<body>
     <button onClick="execFatorial()">Fatorial</button>
     <button onClick="execSomatorio()">Somatorio</button>
     
<!-- Incorporando um arquivo .js externo -->
<script src="fatorial.js"></script>
     
<!-- Incorporando JavaScript interno -->
<script> 
     execFatorial = () => {
          let numero = eval(prompt("Valor"));
          alert(`Fatorial de ${numero}:${fatorial(numero)}`);
     }
     execSomatorio = () => {
          const valores = [1,2,3,4,5,6];
          alert(`Soma dos numeros de 1 a 6: ${somatorio(valores)}`);
     }
</script>
</body>     
</html>
