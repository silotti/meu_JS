<!-- Incorporando códigos Javascript diretamente na página -->    
<!-- Funções no JavaScript -->
<script>
    //função padrão
    function somar1(a,b) {
        return a + b;
    }
    //ou função arrow com return
    let somar2 = (a,b) => {
        return a + b;
    }
    //ou function arrow simplificada
    let somar3 = (a,b) => a + b;
</script>
