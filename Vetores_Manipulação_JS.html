<!-- Acesso e Alteração de Valores -->
<!-- Agoritimo bubble -->
<!DOCTYPE html><html><body><script>
const bubble = (v) => {
    let ordenado = false;
    while(!ordenado){
        ordenado = true;
        //começa do segundo elemento, para comparar de 2 em 2 elementos
        for(let i=1; i<v.length; i++){
            if(v[i-1]>v[i]){
                const aux = v[i];   
                v[i] = v[i-1];
                v[i-1] = aux;       
                ordenado = false;
            }
        }
    }
}

const valores = [3,1,7,8,4];
console.log(valores); // Imprime: [3, 1, 7, 8, 4]
bubble(valores);
console.log(valores); // Imprime: [1, 3, 4, 7, 8]
</script>
</body></html>

<!-- Matrizes Vetores -->
<!-- Método flat (transformar matriz de 3x2 para um de 6 posições)-->
<html><body><script>
    const matriz = [[1,2],[3,4],[5,6]];
    console.log(matriz); // Imprime: [1, 2, 3, 4, 5, 6]
    const vetor = matriz.flat();
    console.log(vetor); // Imprime: [1, 2, 3, 4, 5, 6]
</script>
</body></html>

<!--------------------------------------------------------->
<!-- Matrizes Vetores -->
<!-- Método Inclusão de Elementos (numa pilha)-->
<html><body><script>
    const valores2 = [3,1,7,8,4];
    console.log(valores2); // Imprime: [3, 1, 7, 8, 4]

    //acrescenta o valor 6 no início do vetor
    valores2.unshift(6);
    console.log(valores2); // Imprime: [6, 3, 1, 7, 8, 4]

    //acrescenta o valor 5 no final do vetor
    valores2.push(5);
    console.log(valores2); // Imprime: [6, 3, 1, 7, 8, 4, 5]
</script></body></html>

<!--------------------------------------------------------->
<!-- Matrizes Vetores -->
<!-- Método Remoção de Elementos (numa pilha)-->
<html><body><script>
    const valores3 = [6,3,1,7,8,4,5];
    console.log(valores3); // Imprime: [6, 3, 1, 7, 8, 4, 5]

    //remove o valor 6 no início do vetor
    console.log(valores3.unshift());
    console.log(valores3); // Imprime: [3, 1, 7, 8, 4, 5]

    //remove o valor 5 no final do vetor
    console.log(valores3.pop());
    console.log(valores3); // Imprime: [3, 1, 7, 8, 4]    
</script></body></html>

<!-- Método Concat() , Junção de Valores = Concatenar -->
<html><body>

<!-- Matrizes Vetores -->
<!-- Remoção com Slice -->
<html><body>
<script>   
    const dias_semana = ["dom", "seg", "ter", "qua", "qui", "sex", "sab"];

    console.log(dias_semana);
    console.log(dias_uteis);
</script>

<!-- Matrizes Vetores -->
<!-- Remoção ou Inserção com Splice -->
<html><body>
<script>   
    const vetor2 = [1,2,3,4,5,6,7]; //declara o vetor
    console.log(vetor2); //1,2,3,4,5,6,7

    //no indice 2, remove 3 valores, no caso os valores:3,4,5 
    vetor2.splice(2,3);
    console.log(vetor2);//1,2,6,7

    //no indice 2, remove 0 valores, e adiciona os valores X e X
    //empurra outros valores existentes pra tras de X,X na pilha
    //se trocar 0 por 1, teria removido o 6
    vetor2.splice(2,0,"X","X");
    console.log(vetor2); //1,2,X,X,6,7
</script>
</body></html>
