<!DOCTYPE html><html><head>
</head><body>
<h2>Estrutura de Decisão IF, ELSE IF, ELSE (modo antigo)</h2>  
<p>Modifica o cumprimento dependendo da hora do dia</p>
<p id="demo">Que horas são?</p>
<script>
let painel = document.getElementById("demo");
//estrutura de decisão if, else if, else (modo antigo)
let hora = new Date().getHours();
if (hora < 12) {
  painel.innerHTML = "Bom dia!";
} else if (hora < 18) {
  painel.innerHTML = "Boa tarde!";
} else {
  painel.innerHTML = "Boa noite!";
}
</script>
</body></html>
