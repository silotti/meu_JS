<!-- Exemplo com números randomicos -->
<html><body><table style="width: 100%">
<script>        
const cores = ["red", "green", "blue"];
//Gera 9 células para cada coluna    
for(let i=0;i<10;i++){
    document.write("<tr>"); //abri uma linha da tabela
    //Gera 9 células para cada linha    
    for(let j=0;j<10;j++){
        //Gera um número aleatório entre 0, 1 ou 2
        //Trunc tira a parte quebrada do número
        let pos = Math.trunc(Math.random()*3); 
        document.write(`<td style="background-color:${cores[pos]}">&nbsp;</td>`); // Escreve uma célula com a cor de fundo selecionada
    }
    document.write("</tr>");
}
</script>
</table></body></html>
