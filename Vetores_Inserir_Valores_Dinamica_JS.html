<!-- Método Inserir Valores de forma Dinâmica-->
<html><body><script>

let alunos = []; // cria o array: alunos , sem nenhum valores 

//insere de forma dinamica no final do array, o valor: Maria
alunos[alunos.length] = 'Maria';
console.log(alunos); // Imprime: Maria

//insere de forma dinamica no final do array, o valor: João
alunos[alunos.length] = 'João';
console.log(alunos); // Imprime: Maria, João
  
</script></body></html>
