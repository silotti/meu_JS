<!DOCTYPE html><html><head>
</head><body>
<h2>Estrutura de Decisão SWITCH e CASE</h2>  
<p>Verifica se o número é par ou ímpar</p>
<p id="demo">Digite um número:</p>

<script>
// A função eval() é utilizada para transformar em numero o valor 
// digitado, que é recebido como string pela função prompt()
let frase = "", b=eval(prompt("Digite um número:"));
// b%2 é o resto da divisão de b por 2
switch (b%2) {
  case (0):
    frase = "O número é par!";
    break;
  case (1):
    frase = "O número é ímpar!";
}
alert(frase);
</script>

</body></html>
