<script>
    var numeros=[];

    numeros[0]=solicitaNum1();

    var result=divida(numeros);

/*Funções Javascript*/
function solicitaNum1(){
    var n1 = prompt("Insira o primeiro número: ");
    if(n1 < 0){
        alert("O número precisa ser inteiro e positivo");
              return soliticaNum1();
    }else{
        return n1;
    }    
}

function solicitaNum2(){
    var n2 = prompt("Insira o primeiro número: ");
    if(n2 < 0){
        alert("O número precisa ser inteiro e positivo");
              return soliticaNum2();
    }else{
        return n2;
    }    
}

//função de divisão
function divida(numeros){
     var resultado = 0;
     resultado = numeros[0] / numeros[1];
     return resultado;
}
